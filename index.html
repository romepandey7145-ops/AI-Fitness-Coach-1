<!DOCTYPE html>
<html>
<head>
<title>AI Fitness Coach</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:12px 20px;
font-size:16px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
margin:10px;
}

video{
width:400px;
border-radius:10px;
margin-top:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

</head>

<body>

<h1>AI Fitness Coach</h1>

<button onclick="startCamera()">Start Workout Camera</button>

<br>

<video id="video" autoplay playsinline></video>

<h2>Food Scanner</h2>

<input type="file" id="foodUpload">

<p id="foodResult"></p>

<script>

const video = document.getElementById("video");

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

startPoseDetection();

}

function startPoseDetection(){

const pose = new Pose({
locateFile: (file) => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
}
});

pose.onResults(results => {

if(results.poseLandmarks){
console.log("Body detected");
}

});

const camera = new Camera(video,{
onFrame: async () => {
await pose.send({image: video});
},
width:640,
height:480
});

camera.start();

}

document.getElementById("foodUpload").onchange = function(){

document.getElementById("foodResult").innerText =
"Food image uploaded. Nutrition API needed.";

};

</script>

</body>
</html>
