<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitAI — Your AI Fitness Coach</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans&display=swap" rel="stylesheet" />
<!-- React & Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #080C14;
  --bg2: #0D1220;
  --bg3: #131929;
  --surface: #161E2E;
  --surface2: #1C2638;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --lime: #C8F135;
  --lime2: #A8D120;
  --lime-dim: rgba(200,241,53,0.12);
  --lime-glow: rgba(200,241,53,0.25);
  --blue: #4E9EFF;
  --blue-dim: rgba(78,158,255,0.12);
  --orange: #FF7A35;
  --orange-dim: rgba(255,122,53,0.12);
  --pink: #FF4F8B;
  --pink-dim: rgba(255,79,139,0.12);
  --teal: #2DDCB4;
  --teal-dim: rgba(45,220,180,0.12);
  --text: #F0F4FF;
  --text2: #8B96B0;
  --text3: #5A6478;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #040608;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  margin: 0;
}

/* Basic styling, include your styles from above */
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function App() {
  const [screen, setScreen] = React.useState('welcome');

  const goTo = (id) => setScreen(id);

  return (
    <div className="phone-shell" style={{width: '390px', height: '844px', margin: '20px auto', position: 'relative'}}>
      {screen === 'welcome' && <WelcomeScreen onNext={() => goTo('signup')} />}
      {screen === 'signup' && <SignUpScreen onNext={() => goTo('onboard')} onBack={() => goTo('welcome')} />}
      {screen === 'onboard' && <Onboarding onFinish={() => goTo('dashboard')} onBack={() => goTo('signup')} />}
      {screen === 'dashboard' && <Dashboard onNavigate={goTo} />}
      {screen === 's-myworkout' && <WorkoutPlan onBack={() => goTo('dashboard')} />}
      {screen === 's-mydiet' && <MyDiet onBack={() => goTo('dashboard')} />}
      {screen === 's-myprogress' && <MyProgress onBack={() => goTo('dashboard')} />}
      {screen === 's-premium' && <Premium onBack={() => goTo('dashboard')} />}
      {screen === 's-workout' && <WorkoutLibrary onBack={() => goTo('dashboard')} />}
      {screen === 's-food' && <FoodScanner onBack={() => goTo('dashboard')} />}
      {screen === 's-chat' && <Chat onBack={() => goTo('dashboard')} />}
    </div>
  );
}

// Components
function WelcomeScreen({onNext}) {
  return (
    <div style={{backgroundColor: 'var(--bg)', height: '100%', display:'flex', flexDirection:'column', justifyContent:'space-between'}}>
      <div style={{padding:'20px', textAlign:'center'}}>
        <div style={{fontSize:'72px', marginBottom:'10px'}}>🏋️</div>
        <h1 style={{fontSize:'28px', fontWeight:'800', fontFamily:'Syne'}}>Your AI<br/>Fitness Coach</h1>
        <p style={{fontSize:'13px', marginTop:'4px', maxWidth:'230px', marginLeft:'auto', marginRight:'auto'}}>
          Transform your body with intelligent workouts and smart nutrition guidance.
        </p>
        <div style={{marginTop:'14px', display:'flex', justifyContent:'center', gap:'10px'}}>
          <button onClick={onNext} style={{backgroundColor:'var(--lime)', color:'#080C14', padding:'14px', borderRadius:'10px', border:'none', fontWeight:'700'}}>Get Started — It's Free</button>
        </div>
        <p style={{fontSize:'11px', color:'var(--text3)', marginTop:'16px', textAlign:'center'}}>
          By continuing, you agree to our Terms & Privacy Policy
        </p>
      </div>
    </div>
  );
}

function SignUpScreen({onNext, onBack}) {
  const [name, setName] = React.useState('Alex Johnson');
  const [email, setEmail] = React.useState('alex@example.com');
  const [password, setPassword] = React.useState('••••••••');

  return (
    <div style={{backgroundColor:'var(--bg)', height:'100%', overflow:'auto'}}>
      <div style={{padding:'20px'}}>
        <div style={{display:'flex', alignItems:'center', marginBottom:'10px'}}>
          <div style={{width:'36px', height:'36px', background:'var(--surface)', borderRadius:'10px', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer'}} onClick={onBack}>
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" strokeWidth="2">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
          </div>
        </div>
        <h2 style={{fontSize:'26px', marginBottom:'6px'}}>Create Account</h2>
        <p style={{color:'var(--text2)', fontSize:'14px', marginBottom:'24px'}}>Start your transformation today</p>
        {/* Inputs */}
        <div style={{display:'flex', flexDirection:'column', gap:'10px', marginBottom:'20px'}}>
          <button style={{width:'100%', padding:'14px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'10px', fontWeight:'600'}}>Continue with Google</button>
          <button style={{width:'100%', padding:'14px', background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'10px', fontWeight:'600'}}>Continue with Apple</button>
        </div>
        <div style={{display:'flex', alignItems:'center', margin:'20px 0'}}>
          <div style={{flex:'1', height:'1px', background:'var(--border)'}}></div>
          <span style={{margin:'0 10px', fontSize:'12px', color:'var(--text3)'}}>OR</span>
          <div style={{flex:'1', height:'1px', background:'var(--border)'}}></div>
        </div>
        {/* Manual Inputs */}
        <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
          <label>Full Name</label>
          <input style={{width:'100%', padding:'14px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px'}} type="text" placeholder="Alex Johnson" value={name} onChange={(e) => setName(e.target.value)} />
          <label>Email Address</label>
          <input style={{width:'100%', padding:'14px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px'}} type="email" placeholder="alex@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
          <label>Password</label>
          <input style={{width:'100%', padding:'14px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px'}} type="password" placeholder="Min. 8 characters" value={password} onChange={(e) => setPassword(e.target.value)} />
        </div>
        <div style={{marginTop:'20px'}}>
          <button onClick={onNext} style={{width:'100%', padding:'14px', background:'var(--lime)', color:'#080C14', fontWeight:'700', border:'none', borderRadius:'10px'}}>Create Free Account</button>
        </div>
        <p style={{marginTop:'16px', fontSize:'13px', color:'var(--text3)', textAlign:'center'}}>
          Already have an account? <span style={{color:'var(--lime)', cursor:'pointer'}} onClick={onBack}>Log In</span>
        </p>
      </div>
    </div>
  );
}

function Onboarding({onFinish, onBack}) {
  const [step, setStep] = React.useState(1);
  const totalSteps = 5;

  const next = () => setStep(s => Math.min(s+1, totalSteps));
  const back = () => setStep(s => Math.max(s-1, 1));

  // Build dots
  const dots = [];
  for (let i=1; i<=totalSteps; i++) {
    dots.push(
      <div key={i} style={{
        width:'8px', height:'8px', borderRadius:'50%',
        background:i===step?'var(--lime)':'var(--surface2)',
        margin:'0 4px'
      }}></div>
    );
  }

  return (
    <div style={{backgroundColor:'var(--bg)', height:'100%', overflow:'auto'}}>
      {/* Progress dots */}
      <div style={{display:'flex', justifyContent:'center', padding:'8px'}}>
        {dots}
      </div>
      {/* Step content */}
      {step === 1 && (
        <div style={{padding:'20px'}}>
          <h2 style={{fontSize:'22px'}}>Basic Information</h2>
          <p style={{fontSize:'14px', color:'var(--text2)', marginTop:'4px'}}>Help us personalize your plan</p>
          {/* Your input fields for age, gender, etc. */}
          <button style={{marginTop:'20px', padding:'14px', background:'var(--lime)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={next}>Continue →</button>
        </div>
      )}
      {step === 2 && (
        <div style={{padding:'20px'}}>
          <h2 style={{fontSize:'22px'}}>Your Fitness Goal</h2>
          {/* Your goal options and inputs */}
          <button style={{marginTop:'20px', padding:'14px', background:'var(--lime)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={next}>Continue →</button>
          <button style={{marginTop:'10px', padding:'14px', background:'var(--border2)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={back}>← Back</button>
        </div>
      )}
      {step === 3 && (
        <div style={{padding:'20px'}}>
          <h2 style={{fontSize:'22px'}}>Workout Preferences</h2>
          {/* Your options */}
          <button style={{marginTop:'20px', padding:'14px', background:'var(--lime)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={next}>Generate Plan →</button>
          <button style={{marginTop:'10px', padding:'14px', background:'var(--border2)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={back}>← Back</button>
        </div>
      )}
      {step === 4 && (
        <div style={{padding:'20px', textAlign:'center'}}>
          <div style={{width:'80px', height:'80px', background:'var(--lime-dim)', border:'2px solid var(--lime)', borderRadius:'50%', margin:'0 auto', fontSize:'36px', display:'flex', alignItems:'center', justifyContent:'center'}}>🧠</div>
          <h2 style={{fontSize:'22px', marginTop:'20px'}}>Calculating Your Stats</h2>
          <p style={{color:'var(--text2)', fontSize:'14px', marginTop:'20px'}}>AI is computing your personalized metrics</p>
          {/* Your display of BMI, BMR, etc. */}
          <button style={{marginTop:'20px', padding:'14px', background:'var(--lime)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={next}>Generate Plan →</button>
          <button style={{marginTop:'10px', padding:'14px', background:'var(--border2)', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={back}>← Back</button>
        </div>
      )}
      {step === 5 && (
        <div style={{padding:'20px', textAlign:'center'}}>
          <div style={{position:'relative'}}>
            <div style={{width:'300px', height:'300px', background:'radial-gradient(circle, rgba(200,241,53,0.12), transparent 70%)', borderRadius:'50%', position:'absolute', top:'-50px', left:'50%', transform:'translateX(-50%)', animation:'pulse 2s ease-in-out infinite'}}></div>
            <div style={{position:'relative', zIndex:1}}>
              <div style={{fontSize:'64px', marginBottom:'16px'}} role="img" aria-label="target">🎯</div>
              <h2 style={{fontSize:'24px', marginBottom:'8px', color:'var(--lime)'}}>Your AI Fitness Plan is Ready!</h2>
              <p style={{color:'var(--text2)', fontSize:'14px', lineHeight:'1.5'}}>Personalized just for you based on your goals, body metrics, and preferences.</p>
              {/* Your plan options */}
              <button style={{marginTop:'28px', padding:'14px', background:'var(--lime)', color:'#080C14', border:'none', borderRadius:'10px', fontWeight:'600', width:'100%'}} onClick={onFinish}>Start My Journey 🚀</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Dashboard({onNavigate}) {
  const [water, setWater] = React.useState([true, true, true, true, true, false, false, false]);
  const [weight, setWeight] = React.useState([78,77.4,77.1,76.6,76.2,75.6,74.8]);

          <div>
            <p style={{fontSize:'12px', color:'var(--text3)'}}>Good morning 👋</p>
            <h2 style={{fontSize:'20px'}}>Alex Johnson</h2>
          </div>
          <div style={{display:'flex', gap:'10px', alignItems:'center'}}>
            <div style={{background:'var(--orange-dim)', border:'1px solid rgba(255,122,53,0.2)', borderRadius:'50%', padding:'6px 12px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'14px', fontWeight:'700'}}>
              🔥 <span style={{marginLeft:'4px'}}>12</span>
            </div>
            <div style={{width:'36px', height:'36px', background:'var(--lime)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', fontSize:'16px', color:'#080C14'}}>A</div>
          </div>
        </div>
      </div>

      {/* Rings */}
      <div style={{display:'flex', gap:'12px', padding:'0 20px'}}>
        {/* Calories */}
        <div style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px', flex:'1', padding:'14px', textAlign:'center'}}>

          <div style={{fontSize:'16px', fontWeight:'700', marginTop:'4px'}}>70%<br/>1540</div>

        {/* Protein */}

        </div>
        {/* Water */}
        <div style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'10px', flex:'1', padding:'14px', textAlign:'center'}}>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:'11px', color:'var(--text3)', letterSpacing:'0.08em', textTransform:'uppercase'}}>Today's Workout</div>
            <div style={{fontSize:'18px', fontWeight:'700', marginTop:'4px'}}>Upper Body Power</div>

          <span style={{background:'rgba(200,241,53,0.1)', padding:'4px 10px', borderRadius:'100px', fontSize:'11px', color:'var(--lime)'}}>Shoulders</span>
          <span style={{background:'rgba(200,241,53,0.1)', padding:'4px 10px', borderRadius:'100px', fontSize:'11px', color:'var(--lime)'}}>Triceps</span>

            <div style={{fontSize:'16px', fontWeight:'700', marginTop:'4px'}}>1540/2200</div>

      {/* Premium Banner */}
      <div style={{margin:'20px', background:'linear-gradient(135deg,#1a2840,#0e1828)', border:'1px solid rgba(200,241,53,0.2)', borderRadius:'20px', padding:'20px'}}>
        <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px'}}>

          <div style={{fontSize:'14px', fontWeight:'700', color:'var(--lime)'}}>Upgrade to Premium</div>

          </div>

            📸<br/>Food Scanner
          </div>

          </div>

            📊<br/>My Progress
          </div>

      <div style={{position:'fixed', bottom:'0', width:'100%', height:'82px', background:'rgba(13,18,32,0.96)', display:'flex', justifyContent:'space-around', alignItems:'center'}}>
        <NavItem label="Home" active={true} onClick={() => onNavigate('dashboard')} />
        <NavItem label="Workouts" onClick={() => onNavigate('s-workout')} />

}

function NavItem({label, active, onClick}) {
  return (
    <div onClick={onClick} style={{display:'flex', flexDirection:'column', alignItems:'center', cursor:'pointer', flex:'1'}}>
      {/* simplified icons */}
      <div style={{width:'22px', height:'22px', marginBottom:'4px', color: active ? 'var(--lime)' : 'var(--text3)'}}>
        {label === 'Home' && '🏠'}
        {label === 'Workouts' && '🏋️'}
        {label === 'AI Cam' && '📷'}
        {label === 'Nutrition' && '🍎'}
        {label === 'Coach' && '💬'}
      </div>
      <span style={{fontSize:'10px', color: active ? 'var(--lime)' : 'var(--text3)'}}>{label}</span>
    </div>
  );
}

function toggleCup(index, water, setWater) {
  const newW = [...water];
  newW[index] = !newW[index];
  setWater(newW);
}

  const [weightData, setWeightData] = React.useState([78,77.4,77.1,76.6,76.2,75.6,74.8]);
  const [totalReps, setTotalReps] = React.useState(18);
  const [weightLost, setWeightLost] = React.useState('-3.2 kg');

  return (
    <div style={{backgroundColor:'var(--bg)', minHeight:'100%', overflow:'auto'}}>
      {/* Header */}
      <div style={{padding:'20px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <p style={{fontSize:'12px', color:'var(--text3)'}}>Good morning 👋</p>
            <h2 style={{fontSize:'20px'}}>Alex Johnson</h2>
          </div>
          <div style={{display:'flex', gap:'10px', alignItems:'center'}}>
            <div style={{background:'var(--orange-dim)', border:'1px solid rgba(255,122,53,0.2)', borderRadius:'50%', padding:'6px 12px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'14px', fontWeight:'700'}}>
